<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Builder's Book Inc. - Online Catalog</title>

<style>

:root{
  --page-width:520px;
  --page-height:673px;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#ececec 0%,#dcdcdc 45%,#d6d6d6 100%);
  font-family:Arial,sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
}

#loadingScreen{
  position:fixed;
  inset:0;
  background:#dcdcdc;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
  font-weight:600;
}

.menu-bar{
  width:min(1600px,94vw);
  margin:16px 0 12px 0;
  padding:12px 14px;
  display:flex;
  justify-content:center;
  gap:14px;
  background:rgba(255,255,255,.8);
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.menu-btn{
  min-width:46px;
  height:32px;
  padding:0 12px;
  border:1px solid rgba(0,0,0,.08);
  background:white;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
}

#book-shell{
  width:min(1600px,94vw);
  height:calc(100vh - 210px);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#zoom-stage{
  transform-origin:center center;
}

.pdf-page{
  width:var(--page-width);
  height:var(--page-height);
  position:relative;
  background:#fff;
}

.pdf-page canvas{
  width:100%;
  height:100%;
}

.controls{
  margin-top:12px;
  display:flex;
  gap:14px;
}

.slider-wrap{
  width:min(1600px,94vw);
  margin:12px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

#pageSlider{
  width:100%;
}

</style>
</head>

<body>

<div id="loadingScreen">Loading Catalog...</div>

<div class="menu-bar">

<button class="menu-btn" id="zoomOutBtn">−</button>

<div>Zoom: <span id="zoomDisplay">100%</span></div>

<button class="menu-btn" id="zoomInBtn">+</button>

<button class="menu-btn" id="resetZoomBtn">Reset</button>

<button class="menu-btn" id="printBtn">Print</button>

</div>

<div id="book-shell">
<div id="zoom-stage">
<div id="book"></div>
</div>
</div>

<div class="controls">
<button class="menu-btn" id="prevBtn">← Back</button>
<button class="menu-btn" id="nextBtn">Next →</button>
</div>

<div class="slider-wrap">

<div>
Page <span id="pageDisplay">1</span>
</div>

<input type="range" id="pageSlider" min="0" max="0" step="1">

</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script type="module">

import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.worker.min.mjs";

const pdfUrl="./catalog.pdf";

const book=document.getElementById("book");
const bookShell=document.getElementById("book-shell");
const zoomStage=document.getElementById("zoom-stage");

const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");

const pageSlider=document.getElementById("pageSlider");
const pageDisplay=document.getElementById("pageDisplay");

const zoomDisplay=document.getElementById("zoomDisplay");
const zoomInBtn=document.getElementById("zoomInBtn");
const zoomOutBtn=document.getElementById("zoomOutBtn");
const resetZoomBtn=document.getElementById("resetZoomBtn");

const printBtn=document.getElementById("printBtn");

let pdfDoc;
let pageFlip;

let pageCount=0;
let currentIndex=0;

let zoomLevel=1;

const zoomStep=0.25;

let panX=0;
let panY=0;

const renderScale=2;

const renderedPages=new Set();

function setZoom(z){

zoomLevel=Math.max(1,Math.min(3,z));

zoomStage.style.transform=
`translate(${panX}px,${panY}px) scale(${zoomLevel})`;

zoomDisplay.textContent=Math.round(zoomLevel*100)+"%";

}

function makePage(pageNumber){

const page=document.createElement("div");
page.className="pdf-page";
page.dataset.page=pageNumber;

const canvas=document.createElement("canvas");

page.appendChild(canvas);

return page;

}

async function renderPage(pageNumber){

if(renderedPages.has(pageNumber)) return;

const pageEl=book.querySelector(`[data-page="${pageNumber}"]`);
const canvas=pageEl.querySelector("canvas");

const pdfPage=await pdfDoc.getPage(pageNumber);

const viewport=pdfPage.getViewport({scale:renderScale});

canvas.width=viewport.width;
canvas.height=viewport.height;

const ctx=canvas.getContext("2d");

await pdfPage.render({canvasContext:ctx,viewport}).promise;

renderedPages.add(pageNumber);

}

function updateStatus(){

pageDisplay.textContent=currentIndex+1;
pageSlider.value=currentIndex;

}

function buildFlipbook(){

const PageFlipClass=
window.St?.PageFlip ||
window.PageFlip?.PageFlip ||
window.PageFlip;

pageFlip=new PageFlipClass(book,{
width:520,
height:673,
size:"fixed",
showCover:true,
mobileScrollSupport:false
});

pageFlip.loadFromHTML(document.querySelectorAll(".pdf-page"));

pageFlip.on("flip",()=>{

currentIndex=pageFlip.getCurrentPageIndex();

updateStatus();

renderPage(currentIndex+1);

});

}

async function init(){

const loadingTask=pdfjsLib.getDocument(pdfUrl);

pdfDoc=await loadingTask.promise;

pageCount=pdfDoc.numPages;

for(let i=1;i<=pageCount;i++){

book.appendChild(makePage(i));

}

buildFlipbook();

pageSlider.max=pageCount-1;

updateStatus();

await renderPage(1);

document.getElementById("loadingScreen").style.display="none";

}

prevBtn.onclick=()=>pageFlip.flipPrev();

nextBtn.onclick=()=>pageFlip.flipNext();

zoomInBtn.onclick=()=>setZoom(zoomLevel+zoomStep);

zoomOutBtn.onclick=()=>setZoom(zoomLevel-zoomStep);

resetZoomBtn.onclick=()=>setZoom(1);

printBtn.onclick=()=>window.open(pdfUrl);

pageSlider.oninput=()=>{

pageFlip.flip(parseInt(pageSlider.value));

};

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") pageFlip.flipPrev();

if(e.key==="ArrowRight") pageFlip.flipNext();

});

init();

</script>

</body>
</html>
