<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Builder's Book Inc. - Online Catalog</title>

<style>
:root{
  --page-width: 520px;
  --page-height: 673px;
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top, #ececec 0%, #dcdcdc 45%, #d6d6d6 100%);
  font-family:Arial,sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  box-sizing:border-box;
}

#loadingScreen{
  position:fixed;
  inset:0;
  background:#dcdcdc;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
  gap:10px;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

.loaderText{
  font-size:22px;
  font-weight:600;
  color:#333;
}

.errorText{
  font-size:14px;
  line-height:1.45;
  color:#991b1b;
  max-width:900px;
  white-space:pre-wrap;
  word-break:break-word;
}

.menu-bar{
  width:min(1600px,94vw);
  margin:16px 0 12px 0;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.55);
  border-radius:18px;
  box-shadow:
    0 12px 30px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.65);
  box-sizing:border-box;
}

.menu-group{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.menu-btn{
  min-width:46px;
  height:32px;
  padding:0 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:1px solid rgba(0,0,0,.08);
  background:rgba(255,255,255,.9);
  color:#1f2937;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  letter-spacing:.01em;
  box-shadow:
    0 6px 18px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
  transition:
    transform .18s ease,
    box-shadow .18s ease,
    background .18s ease,
    border-color .18s ease;
  user-select:none;
  text-decoration:none;
  box-sizing:border-box;
}

.menu-btn:hover{
  transform:translateY(-1px);
  background:#ffffff;
  border-color:rgba(0,0,0,.12);
  box-shadow:
    0 10px 22px rgba(0,0,0,.10),
    inset 0 1px 0 rgba(255,255,255,.95);
}

.menu-btn:active{
  transform:translateY(0);
}

.menu-btn.icon-only{
  width:46px;
  padding:0;
  font-size:24px;
  line-height:1;
}

.menu-divider{
  width:1px;
  height:32px;
  background:linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,.14), rgba(0,0,0,0));
  margin:0 2px;
}

.zoom-pill{
  min-width:104px;
  height:32px;
  padding:0 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(0,0,0,.08);
  background:rgba(248,250,252,.95);
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  color:#334155;
  box-sizing:border-box;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
}

#book-shell{
  width:min(1600px,94vw);
  height:calc(100vh - 210px);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  box-sizing:border-box;
  padding:16px 24px 12px 24px;
  cursor:default;
}

#zoom-stage{
  position:relative;
  transform-origin:center center;
  will-change:transform;
  display:flex;
  align-items:center;
  justify-content:center;
}

#book{
  margin:auto;
}

.pdf-page{
  width:var(--page-width);
  height:var(--page-height);
  position:relative;
  background:#fff;
  overflow:hidden;
  border:1px solid #e5e7eb;
  box-sizing:border-box;
}

.pdf-page canvas{
  width:100%;
  height:100%;
  display:block;
  background:#fff;
  user-select:none;
  -webkit-user-drag:none;
}

.page-loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:600;
  color:#6b7280;
  background:#fff;
  z-index:1;
}

.link-layer{
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
}

.link-layer a{
  position:absolute;
  display:block;
  pointer-events:auto;
  background:transparent;
}

.link-layer a:hover{
  outline:2px solid rgba(59,130,246,.35);
  outline-offset:-1px;
}

.controls{
  margin-top:12px;
  margin-bottom:6px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

.slider-wrap{
  width:min(1600px,94vw);
  margin:0 0 16px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.slider-label{
  font-size:14px;
  color:#1f2937;
  font-weight:600;
}

#pageSlider{
  width:100%;
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  height:10px;
  border-radius:999px;
  outline:none;
  background:linear-gradient(to right, #475569 0%, #475569 0%, #94a3b8 0%, #94a3b8 100%);
}

#pageSlider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:1px solid rgba(15,23,42,.25);
  box-shadow:0 4px 10px rgba(0,0,0,.22);
}

#pageSlider::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:1px solid rgba(15,23,42,.25);
  box-shadow:0 4px 10px rgba(0,0,0,.22);
}

#pageSlider::-moz-range-track{
  height:10px;
  border-radius:999px;
  background:#94a3b8;
  border:none;
}

.is-zoomed{
  cursor:grab !important;
}

.is-dragging{
  cursor:grabbing !important;
}

@media (max-width: 900px){
  .menu-bar{
    flex-direction:column;
    align-items:stretch;
  }

  .menu-group{
    justify-content:center;
  }

  .menu-divider{
    display:none;
  }

  #book-shell{
    height:calc(100vh - 270px);
    padding:12px 16px 10px 16px;
  }
}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="loaderText">Loading Catalog...</div>
  <div class="errorText" id="errorText"></div>
</div>

<div class="menu-bar">
  <div class="menu-group">
    <button class="menu-btn icon-only" id="zoomOutBtn" aria-label="Zoom out" title="Zoom out">−</button>
    <div class="zoom-pill">Zoom: <span id="zoomDisplay" style="margin-left:6px;">100%</span></div>
    <button class="menu-btn icon-only" id="zoomInBtn" aria-label="Zoom in" title="Zoom in">+</button>
    <button class="menu-btn" id="resetZoomBtn" aria-label="Reset zoom" title="Reset zoom">Reset</button>
    <div class="menu-divider"></div>
    <button class="menu-btn" id="printBtn" aria-label="Print catalog" title="Print catalog">Print</button>
  </div>
</div>

<div id="book-shell">
  <div id="zoom-stage">
    <div id="book"></div>
  </div>
</div>

<div class="controls">
  <button class="menu-btn" id="prevBtn" aria-label="Back" title="Back">← Back</button>
  <button class="menu-btn" id="nextBtn" aria-label="Next page" title="Next page">Next →</button>
</div>

<div class="slider-wrap">
  <div class="slider-label">
    <span id="pageDisplay">Front Cover</span>
  </div>
  <input type="range" id="pageSlider" min="0" max="0" step="1" value="0">
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script type="module">
import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.worker.min.mjs";

/* =========================
   ADD OR REMOVE PDF FILES HERE
   ========================= */
const pdfUrls = [
  "./catalog1.pdf",
  "./catalog2.pdf",
  "./catalog3.pdf"
  "./catalog4.pdf"
  "./catalog5.pdf"
  "./catalog6.pdf"

];

const bookEl = document.getElementById("book");
const bookShell = document.getElementById("book-shell");
const zoomStage = document.getElementById("zoom-stage");
const loadingScreen = document.getElementById("loadingScreen");
const errorText = document.getElementById("errorText");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pageSlider = document.getElementById("pageSlider");
const pageDisplay = document.getElementById("pageDisplay");
const zoomDisplay = document.getElementById("zoomDisplay");
const zoomInBtn = document.getElementById("zoomInBtn");
const zoomOutBtn = document.getElementById("zoomOutBtn");
const resetZoomBtn = document.getElementById("resetZoomBtn");
const printBtn = document.getElementById("printBtn");

let pdfDocs = [];
let globalPages = [];
let pageFlip = null;
let pageCount = 0;
let currentIndex = 0;
let pageRatio = 0.7723577236;
let pageWidth = 520;
let pageHeight = 673;

let wheelLock = false;
let resizeTimer = null;

let zoomLevel = 1;
const minZoom = 1;
const maxZoom = 3;
const zoomStep = 0.25;

let panX = 0;
let panY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startPanX = 0;
let startPanY = 0;
let suppressNextClick = false;
const dragThreshold = 6;

const renderedPages = new Set();
const renderingPages = new Set();
const destCache = new Map();
const renderScale = Math.max(1.5, Math.min(2, window.devicePixelRatio || 1));

function showError(message) {
  console.error(message);
  errorText.textContent = String(message);
}

function setPageSizeVars() {
  document.documentElement.style.setProperty("--page-width", `${pageWidth}px`);
  document.documentElement.style.setProperty("--page-height", `${pageHeight}px`);
}

function updateSliderFill() {
  const min = parseFloat(pageSlider.min) || 0;
  const max = parseFloat(pageSlider.max) || 1;
  const val = parseFloat(pageSlider.value) || 0;
  const percent = max === min ? 0 : ((val - min) / (max - min)) * 100;

  pageSlider.style.background =
    `linear-gradient(to right, #475569 0%, #475569 ${percent}%, #94a3b8 ${percent}%, #94a3b8 100%)`;
}

function getVisibleSpreadInfo(index) {
  if (index === 0) {
    return { type: "cover", left: 1, right: null };
  }

  const left = index + 1;
  const right = Math.min(index + 2, pageCount);

  return { type: "spread", left, right };
}

function getPageLabel(index) {
  const spread = getVisibleSpreadInfo(index);

  if (spread.type === "cover") return "Front Cover";
  if (spread.right && spread.right !== spread.left) return `Pages ${spread.left}-${spread.right}`;
  return `Page ${spread.left}`;
}

function updateStatus() {
  pageDisplay.textContent = getPageLabel(currentIndex);
  pageSlider.value = currentIndex;
  updateSliderFill();
}

function calculateResponsivePageSize() {
  const shellRect = bookShell.getBoundingClientRect();

  if (!shellRect.width || !shellRect.height) return;

  const availableWidth = Math.max(320, shellRect.width - 100);
  const availableHeight = Math.max(320, shellRect.height - 40);

  const spreadSafeWidth = availableWidth / 2;
  const heightSafeWidth = availableHeight * pageRatio;

  let width = Math.min(spreadSafeWidth, heightSafeWidth);
  width = width * 0.94;
  width = Math.max(140, width);

  let height = width / pageRatio;

  pageWidth = Math.floor(width);
  pageHeight = Math.floor(height);

  setPageSizeVars();
}

function getBaseStageSize() {
  if (!pageFlip) {
    return {
      width: pageWidth * 2,
      height: pageHeight
    };
  }

  const isCover = currentIndex === 0;
  return {
    width: isCover ? pageWidth : pageWidth * 2,
    height: pageHeight
  };
}

function clampPan() {
  if (zoomLevel <= 1) {
    panX = 0;
    panY = 0;
    return;
  }

  const shellRect = bookShell.getBoundingClientRect();
  const stageSize = getBaseStageSize();

  const scaledWidth = stageSize.width * zoomLevel;
  const scaledHeight = stageSize.height * zoomLevel;

  const maxPanX = Math.max(0, (scaledWidth - shellRect.width) / 2);
  const maxPanY = Math.max(0, (scaledHeight - shellRect.height) / 2);

  panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
  panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
}

function applyZoom() {
  clampPan();
  zoomStage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  zoomDisplay.textContent = `${Math.round(zoomLevel * 100)}%`;

  if (zoomLevel > 1) {
    bookShell.classList.add("is-zoomed");
  } else {
    bookShell.classList.remove("is-zoomed", "is-dragging");
  }
}

function setZoom(newZoom) {
  zoomLevel = Math.max(minZoom, Math.min(maxZoom, newZoom));
  if (zoomLevel <= 1) {
    panX = 0;
    panY = 0;
  }
  applyZoom();
}

function resetZoom() {
  zoomLevel = 1;
  panX = 0;
  panY = 0;
  applyZoom();
}

function makePageElement(globalPageNumber) {
  const page = document.createElement("div");
  page.className = "pdf-page";
  page.dataset.page = String(globalPageNumber);

  const loading = document.createElement("div");
  loading.className = "page-loading";
  loading.textContent = `Loading page ${globalPageNumber}...`;

  const canvas = document.createElement("canvas");
  const linkLayer = document.createElement("div");
  linkLayer.className = "link-layer";

  page.appendChild(loading);
  page.appendChild(canvas);
  page.appendChild(linkLayer);

  return page;
}

async function resolveDestination(pdfDoc, pdfIndex, dest) {
  try {
    const destArray = typeof dest === "string" ? await pdfDoc.getDestination(dest) : dest;
    if (!destArray || !destArray[0]) return null;

    const ref = destArray[0];
    const cacheKey = `${pdfIndex}:${JSON.stringify(ref)}`;

    if (destCache.has(cacheKey)) return destCache.get(cacheKey);

    const localPageIndex = await pdfDoc.getPageIndex(ref);

    const globalIndex = globalPages.findIndex(
      page => page.pdfIndex === pdfIndex && page.localPageNumber === localPageIndex + 1
    );

    destCache.set(cacheKey, globalIndex);
    return globalIndex;
  } catch {
    return null;
  }
}

async function buildLinkLayer(linkLayer, pdfPage, viewport, pageMeta) {
  linkLayer.innerHTML = "";
  const annotations = await pdfPage.getAnnotations();

  for (const ann of annotations) {
    if (ann.subtype !== "Link" || !ann.rect) continue;

    let href = ann.url || ann.unsafeUrl || "";
    let internalPageIndex = null;

    if (!href && ann.dest) {
      internalPageIndex = await resolveDestination(pageMeta.pdfDoc, pageMeta.pdfIndex, ann.dest);
      if (internalPageIndex == null) continue;
      href = "#";
    }

    const rect = viewport.convertToViewportRectangle(ann.rect);
    const x1 = Math.min(rect[0], rect[2]);
    const y1 = Math.min(rect[1], rect[3]);
    const x2 = Math.max(rect[0], rect[2]);
    const y2 = Math.max(rect[1], rect[3]);

    const w = x2 - x1;
    const h = y2 - y1;
    if (w <= 0 || h <= 0) continue;

    const link = document.createElement("a");
    link.href = href;
    link.style.left = `${(x1 / viewport.width) * 100}%`;
    link.style.top = `${(y1 / viewport.height) * 100}%`;
    link.style.width = `${(w / viewport.width) * 100}%`;
    link.style.height = `${(h / viewport.height) * 100}%`;

    if (internalPageIndex != null) {
      link.addEventListener("click", (e) => {
        if (suppressNextClick) {
          e.preventDefault();
          e.stopPropagation();
          suppressNextClick = false;
          return;
        }

        e.preventDefault();
        if (pageFlip) pageFlip.flip(internalPageIndex, "bottom");
      });
    } else {
      link.target = "_blank";
      link.rel = "noopener noreferrer";

      link.addEventListener("click", (e) => {
        if (suppressNextClick) {
          e.preventDefault();
          e.stopPropagation();
          suppressNextClick = false;
        }
      });
    }

    linkLayer.appendChild(link);
  }
}

async function renderPage(globalPageNumber) {
  if (globalPageNumber < 1 || globalPageNumber > pageCount) return;
  if (renderedPages.has(globalPageNumber) || renderingPages.has(globalPageNumber)) return;

  renderingPages.add(globalPageNumber);

  try {
    const pageMeta = globalPages[globalPageNumber - 1];
    if (!pageMeta) return;

    const pageEl = bookEl.querySelector(`.pdf-page[data-page="${globalPageNumber}"]`);
    if (!pageEl) return;

    const canvas = pageEl.querySelector("canvas");
    const loadingEl = pageEl.querySelector(".page-loading");
    const linkLayer = pageEl.querySelector(".link-layer");

    const pdfPage = await pageMeta.pdfDoc.getPage(pageMeta.localPageNumber);
    const viewport = pdfPage.getViewport({ scale: renderScale });

    const ctx = canvas.getContext("2d", { alpha: false });
    canvas.width = Math.ceil(viewport.width);
    canvas.height = Math.ceil(viewport.height);

    await pdfPage.render({
      canvasContext: ctx,
      viewport
    }).promise;

    await buildLinkLayer(linkLayer, pdfPage, viewport, pageMeta);

    if (loadingEl) loadingEl.style.display = "none";
    renderedPages.add(globalPageNumber);
  } catch (err) {
    showError(`Render error on page ${globalPageNumber}: ${err.message || err}`);
  } finally {
    renderingPages.delete(globalPageNumber);
  }
}

function renderVisibleSet(index) {
  const targets = [];

  for (let offset = -2; offset <= 3; offset++) {
    const zeroBased = index + offset;
    if (zeroBased >= 0 && zeroBased < pageCount) {
      targets.push(zeroBased + 1);
    }
  }

  for (const globalPageNumber of targets) {
    renderPage(globalPageNumber);
  }
}

function goToPage(index) {
  if (!pageFlip) return;
  const safeIndex = Math.max(0, Math.min(pageCount - 1, index));
  pageFlip.flip(safeIndex, "bottom");
}

function destroyFlipbook() {
  if (pageFlip) {
    try {
      pageFlip.destroy();
    } catch (e) {
      console.warn("Flipbook destroy warning:", e);
    }
    pageFlip = null;
  }
}

function buildFlipbook(startIndex = 0) {
  destroyFlipbook();

  const PageFlipClass =
    window.St?.PageFlip ||
    window.PageFlip?.PageFlip ||
    window.PageFlip;

  if (!PageFlipClass) {
    throw new Error("PageFlip library did not load correctly.");
  }

  if (pageWidth < 50 || pageHeight < 50) {
    throw new Error("Calculated catalog size is invalid.");
  }

  pageFlip = new PageFlipClass(bookEl, {
    width: pageWidth,
    height: pageHeight,
    size: "fixed",
    minWidth: 140,
    maxWidth: 1200,
    minHeight: Math.round(140 / pageRatio),
    maxHeight: 1600,
    showCover: true,
    usePortrait: false,
    mobileScrollSupport: false,
    maxShadowOpacity: 0.2,
    startZIndex: 1,
    drawShadow: true,
    flippingTime: 700
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".pdf-page"));

  pageFlip.on("flip", () => {
    currentIndex = pageFlip.getCurrentPageIndex();
    updateStatus();
    resetZoom();
    renderVisibleSet(currentIndex);
  });

  currentIndex = Math.max(0, Math.min(pageCount - 1, startIndex));

  if (currentIndex > 0) {
    pageFlip.turnToPage(currentIndex);
  }

  updateStatus();
  renderVisibleSet(currentIndex);
}

function rebuildFlipbookSize() {
  const keepIndex = currentIndex;

  resetZoom();

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      calculateResponsivePageSize();
      buildFlipbook(keepIndex);
      applyZoom();
    });
  });
}

function printCurrentPdf() {
  const currentPageMeta = globalPages[currentIndex];
  if (!currentPageMeta) return;

  const printWindow = window.open(currentPageMeta.pdfUrl, "_blank");
  if (!printWindow) return;

  const tryPrint = () => {
    try {
      printWindow.focus();
      printWindow.print();
    } catch (e) {
      console.warn("Print warning:", e);
    }
  };

  setTimeout(tryPrint, 700);
}

async function loadAllPdfs() {
  pdfDocs = [];
  globalPages = [];

  for (let pdfIndex = 0; pdfIndex < pdfUrls.length; pdfIndex++) {
    const pdfUrl = pdfUrls[pdfIndex];
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    const pdfDoc = await loadingTask.promise;

    pdfDocs.push(pdfDoc);

    for (let localPageNumber = 1; localPageNumber <= pdfDoc.numPages; localPageNumber++) {
      globalPages.push({
        pdfIndex,
        pdfUrl,
        pdfDoc,
        localPageNumber
      });
    }
  }

  pageCount = globalPages.length;
}

let listenersAttached = false;

function attachEventListeners() {
  if (listenersAttached) return;
  listenersAttached = true;

  prevBtn.addEventListener("click", () => {
    if (pageFlip) pageFlip.flipPrev("bottom");
  });

  nextBtn.addEventListener("click", () => {
    if (pageFlip) pageFlip.flipNext("bottom");
  });

  zoomInBtn.addEventListener("click", () => {
    setZoom(zoomLevel + zoomStep);
  });

  zoomOutBtn.addEventListener("click", () => {
    setZoom(zoomLevel - zoomStep);
  });

  resetZoomBtn.addEventListener("click", resetZoom);
  printBtn.addEventListener("click", printCurrentPdf);

  pageSlider.addEventListener("input", () => {
    const targetIndex = parseInt(pageSlider.value, 10) || 0;
    goToPage(targetIndex);
  });

  document.addEventListener("keydown", (e) => {
    if (!pageFlip) return;

    if (e.key === "ArrowLeft") {
      e.preventDefault();
      pageFlip.flipPrev("bottom");
    }

    if (e.key === "ArrowRight") {
      e.preventDefault();
      pageFlip.flipNext("bottom");
    }

    if ((e.key === "+" || e.key === "=") && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      setZoom(zoomLevel + zoomStep);
    }

    if (e.key === "-" && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      setZoom(zoomLevel - zoomStep);
    }

    if (e.key === "0" && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      resetZoom();
    }

    if (e.key === "Escape") {
      resetZoom();
    }
  });

  bookShell.addEventListener("wheel", (e) => {
    if (!pageFlip) return;

    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (e.deltaY < 0) {
        setZoom(zoomLevel + zoomStep);
      } else {
        setZoom(zoomLevel - zoomStep);
      }
      return;
    }

    if (zoomLevel > 1) return;

    e.preventDefault();

    if (wheelLock) return;
    wheelLock = true;

    if (e.deltaY > 0) {
      pageFlip.flipNext("bottom");
    } else {
      pageFlip.flipPrev("bottom");
    }

    setTimeout(() => {
      wheelLock = false;
    }, 250);
  }, { passive:false });

  bookShell.addEventListener("mousedown", (e) => {
    if (zoomLevel <= 1) return;

    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    startPanX = panX;
    startPanY = panY;
    suppressNextClick = false;

    bookShell.classList.add("is-dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const moveX = e.clientX - dragStartX;
    const moveY = e.clientY - dragStartY;

    if (Math.abs(moveX) > dragThreshold || Math.abs(moveY) > dragThreshold) {
      suppressNextClick = true;
    }

    panX = startPanX + moveX;
    panY = startPanY + moveY;
    applyZoom();
  });

  document.addEventListener("mouseup", () => {
    if (!isDragging) return;
    isDragging = false;
    bookShell.classList.remove("is-dragging");

    setTimeout(() => {
      suppressNextClick = false;
    }, 50);
  });

  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      rebuildFlipbookSize();
    }, 220);
  });
}

async function init() {
  await loadAllPdfs();

  if (!pdfDocs.length) {
    throw new Error("No PDF files were loaded.");
  }

  const firstPage = await pdfDocs[0].getPage(1);
  const firstViewport = firstPage.getViewport({ scale: 1 });
  pageRatio = firstViewport.width / firstViewport.height;

  calculateResponsivePageSize();

  bookEl.innerHTML = "";
  renderedPages.clear();
  renderingPages.clear();
  destCache.clear();

  for (let i = 1; i <= pageCount; i++) {
    bookEl.appendChild(makePageElement(i));
  }

  buildFlipbook(0);
  attachEventListeners();

  pageSlider.max = Math.max(0, pageCount - 1);
  pageSlider.value = 0;
  updateSliderFill();

  await renderPage(1);
  await renderPage(2);
  await renderPage(3);
  await renderPage(4);

  loadingScreen.style.display = "none";
  errorText.textContent = "";
  resetZoom();
  renderVisibleSet(0);
}

init().catch((error) => {
  showError(`Could not load catalog.\n\n${error?.message || error}`);
});
</script>
