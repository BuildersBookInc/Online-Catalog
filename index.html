<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Online Catalog</title>

<style>

:root{
--page-width:520px;
--page-height:673px;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:radial-gradient(circle at top,#ececec 0%,#dcdcdc 45%,#d6d6d6 100%);
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

#loadingScreen{
position:fixed;
inset:0;
background:#dcdcdc;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-size:22px;
font-weight:600;
color:#333;
}

.menu-bar{
width:min(1600px,94vw);
margin:16px 0 10px;
padding:12px;
display:flex;
justify-content:center;
gap:12px;
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,.1);
}

.menu-btn{
height:32px;
padding:0 14px;
border-radius:12px;
border:1px solid rgba(0,0,0,.08);
background:#fff;
font-weight:600;
cursor:pointer;
}

.menu-btn:hover{
background:#f5f5f5;
}

#book-shell{
width:min(1600px,94vw);
height:calc(100vh - 180px);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

#book{
margin:auto;
}

.pdf-page{
width:var(--page-width);
height:var(--page-height);
position:relative;
background:#fff;
overflow:hidden;
border:1px solid #e5e7eb;
}

.pdf-page canvas{
width:100%;
height:100%;
display:block;
}

.link-layer{
position:absolute;
inset:0;
z-index:5;
pointer-events:none;
}

.link-layer a{
position:absolute;
pointer-events:auto;
}

.slider-wrap{
width:min(1600px,94vw);
margin-top:8px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

#pageSlider{
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loadingScreen">Loading Catalog...</div>

<div class="menu-bar">
<button class="menu-btn" id="prevBtn">← Back</button>
<button class="menu-btn" id="nextBtn">Next →</button>
<a class="menu-btn" href="catalog.pdf" target="_blank">Open PDF</a>
</div>

<div id="book-shell">
<div id="book"></div>
</div>

<div class="slider-wrap">
<input type="range" id="pageSlider" min="0" max="0" value="0">
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script type="module">

import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.worker.min.mjs";

const pdfUrl="./catalog.pdf";

const bookEl=document.getElementById("book");
const bookShell=document.getElementById("book-shell");
const slider=document.getElementById("pageSlider");

let pdfDoc=null;
let pageFlip=null;
let pageCount=0;
let currentPage=0;
let pageRatio=0.77;

const renderScale=Math.max(1.5,window.devicePixelRatio||1);

function setPageVars(w,h){
document.documentElement.style.setProperty("--page-width",w+"px");
document.documentElement.style.setProperty("--page-height",h+"px");
}

function calculateSize(){

const rect=bookShell.getBoundingClientRect();

const availableWidth=rect.width-40;
const availableHeight=rect.height-30;

let pageWidth=Math.min(availableWidth/2,availableHeight*pageRatio);
let pageHeight=pageWidth/pageRatio;

setPageVars(pageWidth,pageHeight);

return{pageWidth,pageHeight};

}

function createPage(n){

const page=document.createElement("div");
page.className="pdf-page";
page.dataset.page=n;

const canvas=document.createElement("canvas");
const linkLayer=document.createElement("div");
linkLayer.className="link-layer";

page.appendChild(canvas);
page.appendChild(linkLayer);

return page;

}

async function renderPage(n){

const pageEl=document.querySelector(`[data-page='${n}']`);
const canvas=pageEl.querySelector("canvas");
const linkLayer=pageEl.querySelector(".link-layer");

const pdfPage=await pdfDoc.getPage(n);

const viewport=pdfPage.getViewport({scale:renderScale});

canvas.width=viewport.width;
canvas.height=viewport.height;

await pdfPage.render({
canvasContext:canvas.getContext("2d"),
viewport
}).promise;

const annotations=await pdfPage.getAnnotations();

for(const a of annotations){

if(a.subtype!=="Link")continue;

const rect=viewport.convertToViewportRectangle(a.rect);

const x=Math.min(rect[0],rect[2]);
const y=Math.min(rect[1],rect[3]);
const w=Math.abs(rect[0]-rect[2]);
const h=Math.abs(rect[1]-rect[3]);

const link=document.createElement("a");

link.style.left=(x/viewport.width*100)+"%";
link.style.top=(y/viewport.height*100)+"%";
link.style.width=(w/viewport.width*100)+"%";
link.style.height=(h/viewport.height*100)+"%";

if(a.url){
link.href=a.url;
link.target="_blank";
}

linkLayer.appendChild(link);

}

}

async function init(){

pdfDoc=await pdfjsLib.getDocument(pdfUrl).promise;
pageCount=pdfDoc.numPages;

const first=await pdfDoc.getPage(1);
const v=first.getViewport({scale:1});
pageRatio=v.width/v.height;

const size=calculateSize();

for(let i=1;i<=pageCount;i++){
bookEl.appendChild(createPage(i));
}

pageFlip=new St.PageFlip(bookEl,{
width:size.pageWidth,
height:size.pageHeight,
size:"fixed",
showCover:true,
maxShadowOpacity:0.35
});

pageFlip.loadFromHtml(document.querySelectorAll(".pdf-page"));

pageFlip.on("flip",e=>{
currentPage=e.data;
slider.value=currentPage;
});

document.getElementById("prevBtn").onclick=()=>pageFlip.flipPrev();
document.getElementById("nextBtn").onclick=()=>pageFlip.flipNext();

slider.max=pageCount-1;

slider.addEventListener("input",()=>{
pageFlip.flip(slider.value);
});

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight")pageFlip.flipNext();
if(e.key==="ArrowLeft")pageFlip.flipPrev();

});

bookShell.addEventListener("wheel",e=>{

e.preventDefault();

if(e.deltaY>0)pageFlip.flipNext();
else pageFlip.flipPrev();

},{passive:false});

for(let i=1;i<=Math.min(pageCount,6);i++){
renderPage(i);
}

document.getElementById("loadingScreen").style.display="none";

}

init();

</script>

</body>
</html>
